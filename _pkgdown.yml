url: https://xsdm-project.github.io/xsdm-devel/
template:
  bootstrap: 5
  bslib:
    primary: "#2B6DA8"

navbar:
  structure:
    left:  [home, intro, reference, articles, news]
    right: [github]
  components:
    home: ~
    intro:
      text: "Get started"
      href: articles/how_to_fit.html
    reference:
      text: "Reference"
      href: reference/index.html
    articles:
      text: "Articles"
      menu:
        - text: "The xsdm model"
          href: articles/xsdm_model.html
        - text: "How to fit xsdm models"
          href: articles/how_to_fit.html
        - text: "---"
        - text: "Troubleshooting"
        - text: "  Boundary models"
          href: articles/troubleshooting_bdry1.html
        - text: "  Unusable models"
          href: articles/unuseable_models.html
        - text: "---"
        - text: "Other"
        - text: "  Quickstart"
          href: articles/quickstart.html
    news:
      text: "News"
      href: news/index.html
    github:
      icon: "fab fa-github"
      href: https://github.com/xsdm-project/xsdm-devel

reference:
  - title: "Model fitting"
    desc: "Core functions for fitting xsdm models."
    contents:
      - optimize_likelihood
      - loglik_math
      - loglik_bio
      - start_parms
  - title: "Parameter conversion"
    desc: "Convert between math-scale and biological-scale parameterizations."
    contents:
      - math_to_bio
      - bio_to_math
      - make_mask_names
      - create_mask
      - create_param_vector_masked
      - num_par
      - num_env_var
  - title: "Inference and interpretation"
    desc: "Profile likelihood, distance metrics, and plotting."
    contents:
      - profile_likelihood
      - interpret_parameters
      - dist_between_params
      - convert_equivalence_class
  - title: "Prediction"
    desc: "Habitat suitability and virtual species probability maps."
    contents:
      - habitat_suitability
      - vsp
      - env_data_array
  - title: "Example data"
    desc: "Built-in example datasets for vignettes and testing."
    contents:
      - example_1
      - example_2
      - example_3
  - title: "Utilities"
    desc: "Helper functions."
    contents:
      - build_orthogonal_matrix
      - extract_orthogonal_matrix_parameters
      - expit
      - log1mexp
      - log1pexp
      - log_prob_detect
      - log_prob_detect_cpp
      - loglik_bio_cpp
      - loglik_math_cpp
      - like_ltsg
      - like_neg_ltsgr
  - title: "Package"
    contents:
      - xsdm-package

articles:
  - title: "Getting Started"
    navbar: "Getting Started"
    contents:
      - how_to_fit
      - optimize-likelihood-walkthrough
  - title: "Theory"
    navbar: "Theory"
    contents:
      - xsdm_model
  - title: "Troubleshooting"
    navbar: "Troubleshooting"
    contents:
      - troubleshooting_bdry1
      - unuseable_models
  - title: "Other"
    navbar: "Other"
    contents:
      - quickstart

footer:
  left:
    text: "&copy; 2025-2026 xsdm-project"
  right:
    text: |
      Built with [pkgdown](https://pkgdown.r-lib.org/) &
      [Bootstrap](https://getbootstrap.com/).

development:
  mode: auto
  version_label: default

search:
  across: all
